<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF7EE" />

    <!-- 朱砂印章 favicon。SVG 印鉴风格,栖字以 Noto Serif SC fallback 落字。 -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='4' y='4' width='56' height='56' rx='6' fill='%23B33A2A'/><rect x='4' y='4' width='56' height='56' rx='6' fill='none' stroke='%23FBF7EE' stroke-width='1.2' stroke-dasharray='2 1' transform='translate(2 2) scale(0.94)'/><text x='32' y='46' text-anchor='middle' font-family='Songti SC, STSong, Noto Serif SC, serif' font-size='38' font-weight='700' fill='%23FBF7EE'>栖</text></svg>"
    />

    <!-- 预连 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      字体策略:
        - Fraunces: variable 字体, 衬线展示用, opsz 9pt-144pt 可变, slant 可变.
                    用于大标题、栖字、版面号 (Vol. I, № 001).
        - Source Sans 3: variable, 无衬线正文, 适合 UI / 表单 / 按钮.
        - JetBrains Mono: 等宽, 用于键名、序号、邮箱、URL.
        - Noto Serif SC: 中文衬线, 标题里中文段 fallback.
        - Noto Sans SC: 中文无衬线, 正文里中文段 fallback.

      使用 display=swap 防止字体加载阻塞首屏文字.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Source+Sans+3:ital,wght@0,300..700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>栖枢 · Qishu Archive</title>
  </head>
  <body class="font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
