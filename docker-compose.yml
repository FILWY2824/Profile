# ───────────────────────────────────────────────────────────────────────────
# 栖枢 Profile — docker compose 部署
#
# 用法:
#   cp .env.example .env
#   # 编辑 .env 至少填上 JWT_SECRET、ADMIN_EMAIL、ADMIN_PASSWORD
#   docker compose up -d --build
#
# 数据持久化:
#   使用 Docker 命名卷 qishu_data,Docker 自己管理(实际位置在
#   /var/lib/docker/volumes/qishu_data/_data,但你不需要直接访问)。
#   `docker compose down` 不会删除数据;`docker volume rm qishu_data` 才会。
#
#   备份:    docker run --rm -v qishu_data:/data -v $PWD:/backup alpine \
#              tar czf /backup/qishu-data.tar.gz -C /data .
#   恢复:    docker run --rm -v qishu_data:/data -v $PWD:/backup alpine \
#              tar xzf /backup/qishu-data.tar.gz -C /data
#   查看体积: docker system df -v | grep qishu_data
#
# 端口:
#   外部 3000 -> 容器 8080
# ───────────────────────────────────────────────────────────────────────────

services:
  qishu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    image: qishu:latest
    container_name: qishu
    restart: unless-stopped

    # 外部 3000 -> 容器 8080
    ports:
      - "3000:8080"

    env_file:
      - .env

    # Docker 命名卷,所有权由 Docker 管理(初始化时取自镜像里 /data 的权限)
    volumes:
      - qishu_data:/data

    deploy:
      resources:
        limits:
          memory: 150M

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qishu_data:
    name: qishu_data